name: Stale dependencies check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated.json || true
          node -e "const fs=require('fs');const raw=(fs.existsSync('outdated.json')?fs.readFileSync('outdated.json','utf8'):'').trim();const data=raw?JSON.parse(raw):{};const rows=Object.entries(data).filter(([,v])=>v.current!==v.wanted);if(rows.length===0){fs.writeFileSync('outdated.txt','All dependencies are up to date within allowed ranges.');process.exit(0);}const out=['Package | Current | Update to','---|---|---'];for(const [name,v] of rows){out.push(name+' | '+v.current+' | '+v.wanted);}fs.writeFileSync('outdated.txt',out.join('\n'));"
          cat outdated.txt
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write workflow summary
        if: always()
        run: |
          echo "## Stale dependencies report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat outdated.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: stale-deps-report
          path: outdated.txt
